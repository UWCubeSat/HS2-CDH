exclude = .*/build-artifacts/.*
exclude = .*/build-fprime-automatic-native.*/.*
exclude = .*/lib/fprime/.*
exclude = .*/FlightComputer/Components/.*/test/.*
exclude-lines-by-pattern = \s*assert\(|.*new\s+  # excludes assert and new statements
exclude-throw-branches = yes
exclude-unreachable-branches = yes
exclude-noncode-lines = yes
fail-under-line = 95
fail-under-function = 90
fail-under-branch = 90
html-details = yes
html-medium-threshold = 60
html-high-threshold = 80
html-theme=github.green
html-title = CDH Coverage Report
print-summary = yes
merge-mode-functions = merge-use-line-min
