# actions.yml

on: [push, pull_request]

permissions:
  contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v5
          - run: git submodule update --init --recursive
            shell: bash

          - name: Install GCC 14
            run: |
              sudo apt-get update
              sudo apt-get install -y gcc-14 g++-14
              echo "CC=gcc-14" >> $GITHUB_ENV
              echo "CXX=g++-14" >> $GITHUB_ENV
            shell: bash

          - run: pip install fprime-tools fprime-gds
            shell: bash
          - run: python3 -m venv fprime-venv
            shell: bash
          - run: source fprime-venv/bin/activate
            shell: bash
          - run: pip install -r lib/fprime/requirements.txt
            shell: bash
          - run: pip install fprime-tools fprime-gds
            shell: bash
          - run: fprime-util generate
            shell: bash
          - run: fprime-util build
            shell: bash
    
    test:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v5
          - run: git submodule update --init --recursive
            shell: bash

          - name: Install GCC 14 and gcovr 8.6
            run: |
              sudo apt-get update
              sudo apt-get install -y gcc-14 g++-14
              pip install gcovr==8.6
              echo "CC=gcc-14" >> $GITHUB_ENV
              echo "CXX=g++-14" >> $GITHUB_ENV
              echo "GCOV=gcov-14" >> $GITHUB_ENV
            shell: bash

          - run: pip install fprime-tools fprime-gds
            shell: bash
          - run: python3 -m venv fprime-venv
            shell: bash
          - run: source fprime-venv/bin/activate
            shell: bash
          - run: pip install -r lib/fprime/requirements.txt
            shell: bash

          - run: fprime-util generate --ut
            shell: bash
          - run: fprime-util build --ut # Build unit tests
            shell: bash

          - name: Run coverage
            run: |
              set -euo pipefail
              LOG_FILE="$(mktemp)"
              fprime-util check --coverage \
                --path FlightComputer/Components \
                --recursive \
                --gcov-executable gcov-14 2>&1 | tee "$LOG_FILE"
              if grep -q "(ERROR)" "$LOG_FILE"; then
                echo "Coverage reported errors"
                exit 1
              fi
            shell: bash
    
    # TODO: Cross-compile step!

    documentation:
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        container: huskysat/found:latest

        steps:
          - uses: actions/checkout@v5

          - name: Install Doxygen and rsync
            run: |
              apt-get update
              apt-get install -y doxygen rsync
            shell: bash

          - name: Generate Documentation
            run: |
              set -euo pipefail
              if [ ! -f Doxyfile ]; then
                echo "Doxyfile not found at repository root"
                exit 1
              fi
              LOG_FILE="$(mktemp)"
              doxygen Doxyfile 2>&1 | tee "$LOG_FILE"
              if grep -Eiq '(^|[[:space:]])(warning|error):' "$LOG_FILE"; then
                echo "Doxygen reported warnings/errors"
                exit 1
              fi
            shell: bash

          - name: Set Target Folder in documentation
            id: set-folder
            run: |
              if [ "${{ github.ref_name }}" = "main" ]; then
                echo "target_folder=." >> "$GITHUB_OUTPUT"
              else
                echo "target_folder=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
              fi
            shell: bash

          - name: Upload Pages Artifact
            uses: JamesIves/github-pages-deploy-action@v4
            with:
              branch: documentation
              folder: docs/documentation/
              target-folder: ${{ steps.set-folder.outputs.target_folder }}
